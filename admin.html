<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzz Bee Naturals - Admin Dashboard</title>
    <link rel="stylesheet" href="static/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .admin-header {
            background-color: var(--honey-gold);
            color: var(--dark-brown);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
        }
        
        .admin-header h1 {
            margin: 0;
            font-size: 2rem;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: rgba(43, 27, 23, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .section-title {
            color: var(--light-gold);
            margin-top: 40px;
            font-size: 2.5rem;
        }

        .note-text {
            color: var(--light-gold);
            text-align: center;
        }

        .error-text {
            color: #FF6B6B;
            text-align: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background-color: var(--honey-gold);
            color: var(--dark-brown);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
        }
        
        .stat-label {
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .orders-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #3a2a1f;
            border: 1px solid var(--honey-gold);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .orders-table th {
            background-color: var(--honey-gold);
            color: var(--dark-brown);
            padding: 15px;
            text-align: left;
            font-weight: bold;
        }
        
        .orders-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--honey-gold);
            color: var(--white);
        }
        
        .orders-table tr:hover {
            background-color: #4a3a2f;
        }
        
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-pending {
            background-color: #5a5a00;
            color: #FFFF00;
        }
        
        .status-confirmed {
            background-color: #005a00;
            color: #00FF00;
        }
        
        .status-shipped {
            background-color: #005a5a;
            color: #00FFFF;
        }
        
        .status-delivered {
            background-color: #005a00;
            color: #90EE90;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--light-gold);
        }
    </style>
</head>
<body>
    <header class="page-header">
        <div class="logo">
            <img src="static/logo.png" alt="Buzz Bee Naturals Logo">
            <span>BUZZ BEE NATURALS ADMIN</span>
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="product.html">Products</a>
            <a href="order.html">Order</a>
            <a href="contact.html">Contact</a>
        </nav>
        <a href="#" class="btn-login">Log In</a>
    </header>
    
    <div class="admin-container">
        <div class="admin-header">
            <h1>Order Management Dashboard</h1>
            <p>View and manage all customer orders</p>
        </div>
        
        <div class="stats-grid" id="statsContainer">
            <div class="loading">Loading statistics...</div>
        </div>
        
        <h2 class="section-title">Recent Orders</h2>
        <div id="ordersContainer">
            <div class="loading note-text">Loading orders...</div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        async function loadStats() {
            try {
                const response = await fetch(`${API_BASE}/stats`);
                const stats = await response.json();
                
                document.getElementById('statsContainer').innerHTML = `
                    <div class="stat-card">
                        <div class="stat-number">${stats.total_orders}</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.confirmed}</div>
                        <div class="stat-label">Confirmed</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number">${stats.pending}</div>
                        <div class="stat-label">Pending</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }
        
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/orders`);
                const orders = await response.json();
                
                if (orders.length === 0) {
                    document.getElementById('ordersContainer').innerHTML = 
                        '<p class="note-text">No orders yet</p>';
                    return;
                }
                
                let html = '<table class="orders-table"><thead><tr>';
                html += '<th>ID</th><th>Customer</th><th>Product</th><th>Qty</th>';
                html += '<th>Delivery Date</th><th>Status</th><th>Date</th></tr></thead><tbody>';
                
                orders.forEach(order => {
                    const date = new Date(order.timestamp).toLocaleDateString();
                    const statusClass = `status-${order.status}`;
                    html += `<tr>
                        <td>#${order.id}</td>
                        <td>${order.name}</td>
                        <td>${order.product}</td>
                        <td>${order.quantity}</td>
                        <td>${order.delivery_date}</td>
                        <td><span class="status-badge ${statusClass}">${order.status}</span></td>
                        <td>${date}</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                document.getElementById('ordersContainer').innerHTML = html;
            } catch (error) {
                console.error('Error loading orders:', error);
                document.getElementById('ordersContainer').innerHTML = 
                    '<p class="error-text">Error loading orders</p>';
            }
        }
        
        // Load data on page load
        loadStats();
        loadOrders();
        
        // Refresh every 30 seconds
        setInterval(() => {
            loadStats();
            loadOrders();
        }, 30000);
    </script>
</body>
</html>
